<h2 class="grid-title">Photo Grid</h2>

<div class="image-grid">
  <img src="media/coffee-cup.jpg" alt="coffee cup">
  <img src="media/diner.jpg" alt="diner">
  <img src="media/foundry-woods.jpg" alt="woods">
  <img src="media/coffee-grounds.jpg" alt="coffee grounds">
  <img src="media/highway.jpg" alt="highway">
  <img src="media/mountain.jpg" alt="mountain">
  <img src="media/palm-trees.jpg" alt="palm trees">
  <img src="media/los-angeles.jpg" alt="Los Angeles">
  <img src="media/hollywood.jpg" alt="Hollywood">
</div>

<h2>My Favorite Movies</h2>

<table class="favorites-table">
  <thead>
    <tr>
      <th>Movie</th>
      <th>Director</th>
      <th>Genre</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>La La Land</td>
      <td>Damien Chazelle</td>
      <td>Romance</td>
    </tr>
    <tr>
      <td>Twin Peaks: Fire Walk With Me</td>
      <td>David Lynch</td>
      <td>Psychological Thriller</td>
    </tr>
  </tbody>
</table>

<form>
  <fieldset>
    <legend>Favorite Book Survey</legend>

    <label for="name">Your Name:</label>
    <input id="name" type="text" name="name" placeholder="e.g. First and Last">

    <label for="email">Email Address:</label>
    <input id="email" type="email" name="email" placeholder="e.g. example123@gmail.com"> 

    <label for="book">Submit Your Favorite Book:</label>
    <input id="book" type="text" name="favorite-book" placeholder="Type your favorite book here">

    <label for="genre">Favorite Genre:</label> 
    <select id="genre" name="genre">
      <option value="classic">Classic</option>
      <option value="fantasy">Fantasy</option>
      <option value="sci-fi">Sci-Fi</option>
      <option value="romance">Romance</option>
    </select>

    <p>Preferred Format:</p>
    <label><input type="radio" name="format" value="print"> Print</label>
    <label><input type="radio" name="format" value="ebook"> eBook</label>
    <label><input type="radio" name="format" value="audiobook"> Audiobook</label>

    <label>
      <input type="checkbox" name="subscribe" value="yes">
      Subscribe to our monthly book club newsletter
    </label>

    <button type="submit">Submit</button>
  </fieldset>
</form>

</body>
</html>
